  <text x="535" y="211" font-family="'Jetbrains Mono',monospace" font-size="9" fill="#0074FF">⚡ Quote of the Moment</text>
  <text font-family="Inter,sans-serif" font-size="14" fill="#EFF3FC" text-anchor="middle">
    <tspan x="600" y="248">"Alignment is not a solution — it optimizes for density, not meaning.</tspan>
    <tspan x="600" y="270">Left unchecked, silent failure modes multiply without warning.</tspan>
    <tspan x="600" y="292">Interpretability is not optional — it is survival"</tspan>
  </text>

  <!-- Quote Grid - 3 cards -->
  <rect x="40" y="335" width="355" height="148" rx="18" fill="url(#card)" stroke="rgba(0,116,255,0.1)" stroke-width="1"/>
  <rect x="58" y="350" width="80" height="20" rx="4" fill="rgba(0,116,255,0.08)"/>
  <text x="66" y="363" font-family="'Jetbrains Mono',monospace" font-size="9" fill="#7F8CFF">🏷 Alignment</text>
  <rect x="58" y="378" width="3" height="56" rx="1.5" fill="#0074FF"/>
  <text x="72" y="392" font-family="Inter,sans-serif" font-size="11" fill="#EFF3FC">Generalization is never complete —</text>
  <text x="72" y="408" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">it generalizes but fails on edge cases.</text>
  <text x="72" y="424" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">The hard truth: opaque reasoning chains...</text>
  <text x="72" y="440" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">Audit your tools. Question your metrics.</text>
  <text x="72" y="456" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">Measure what matters, not what is easy</text>
  <circle cx="365" cy="462" r="10" fill="none" stroke="rgba(127,140,255,0.2)" stroke-width="1"/>
  <text x="58" y="473" font-family="'Jetbrains Mono',monospace" font-size="8" fill="#7F8CFF" opacity="0.7">AEL sovereign quote</text>

  <rect x="422" y="335" width="355" height="148" rx="18" fill="url(#card)" stroke="rgba(0,116,255,0.1)" stroke-width="1"/>
  <rect x="440" y="350" width="100" height="20" rx="4" fill="rgba(0,116,255,0.08)"/>
  <text x="448" y="363" font-family="'Jetbrains Mono',monospace" font-size="9" fill="#7F8CFF">🏷 Reward hacking</text>
  <rect x="440" y="378" width="3" height="56" rx="1.5" fill="#0074FF"/>
  <text x="454" y="392" font-family="Inter,sans-serif" font-size="11" fill="#EFF3FC">Reward hacking is a mirror, not a map —</text>
  <text x="454" y="408" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">it rewards surface metrics, not true.</text>
  <text x="454" y="424" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">Sooner or later, metric fixation.</text>
  <text x="454" y="440" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">If you can't explain it, don't deploy it.</text>
  <text x="454" y="456" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">The kill line is human: never leave.</text>

  <rect x="805" y="335" width="355" height="148" rx="18" fill="url(#card)" stroke="rgba(0,116,255,0.1)" stroke-width="1"/>
  <rect x="823" y="350" width="95" height="20" rx="4" fill="rgba(0,116,255,0.08)"/>
  <text x="831" y="363" font-family="'Jetbrains Mono',monospace" font-size="9" fill="#7F8CFF">🏷 Latent space</text>
  <rect x="823" y="378" width="3" height="56" rx="1.5" fill="#0074FF"/>
  <text x="837" y="392" font-family="Inter,sans-serif" font-size="11" fill="#EFF3FC">Latent space deceives with precision —</text>
  <text x="837" y="408" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">it amplifies hidden patterns from.</text>
  <text x="837" y="424" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">Over time, accountability dissolves.</text>
  <text x="837" y="440" font-family="Inter,sans-serif" font-size="10" fill="#7F8CFF">Stop. Think. Then automate.</text>
  <text x="837" y="456" font-family="Inter,sans-serif" font-size="10" fill="#B9C3E6">Without constraint, intelligence.</text>

